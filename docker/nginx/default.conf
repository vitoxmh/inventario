server {
    listen 80;
    root /var/www/html;
    index index.php index.html;
    client_max_body_size 30M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }


    location ~ /\.env {
        deny all;
        return 403; # Or 404
    }

	# Deny access to .env files
    location ~ /\.redirects {
        deny all;
        return 403; # Or 404
    }

    # Deny access to other hidden files/directories (optional, but good practice)
    location ~ /\.(ht|svn|bash|cvs) {
        deny all;
        return 403;
    }

    location /api/ {
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        try_files $uri $uri/ /api/games/index.php?$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param REQUEST_METHOD $request_method;
    }


    	rewrite ^/api/games/([a-z0-9-_]+)/$ /api/games/index.php?id=$1 last;
    	rewrite ^/api/plataformas/([a-z0-9-_]+)/$ /api/plataformas/index.php?id=$1 last;
        rewrite ^/api/consolas/([a-z0-9-_]+)/$ /api/consolas/index.php?id=$1 last;
        rewrite ^/api/imagenes/([a-z0-9-_]+)/$ /api/imagenes/index.php?id=$1 last;
        rewrite ^/api/accesorios/([0-9-_]+)/$ /api/accesorios/index.php?id=$1 last;
        rewrite ^/api/libros/([0-9-_]+)/$ /api/libros/index.php?id=$1 last;
        rewrite ^/api/consolas/([0-9-_]+)/$ /api/consolas/index.php?id=$1 last;


}
