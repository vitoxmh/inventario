version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-dev
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network

  php:
    build: ./docker/php
    container_name: php-dev
    volumes:
      - ./src:/var/www/html
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - DB_HOST=mysql
      - DB_NAME=videojuegos
      - DB_USER=app
      - DB_PASSWORD=app
      - JWT_SECRET=xK#9mP$2vL!nQ@7wR#4tY@8uI@3oP@6aS@1dF@5gH
      - JWT_EXPIRY=900
      - REFRESH_EXPIRY=604800
      - JWT_ISSUER=inventario-api
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql-dev
    restart: always
    environment:
      MYSQL_DATABASE: videojuegos
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    volumes:
      - mysql_dev_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin-dev
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    networks:
      - app-network

  api:
    build: 
      context: ./src-python
      dockerfile: Dockerfile
    container_name: api-python
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    volumes:
      - ./src-python:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DB_HOST: mysql
      DB_NAME: videojuegos
      DB_USER: app
      DB_PASSWORD: app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_dev_data:
